<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Security Camera Client</title>
    <style>
        body { margin:0; padding:0; background:#000; color:white; display:flex; flex-direction:column; height:100vh; font-family:Arial; }
        video { width:100%; flex:1; background:black; }
        .controls { padding:15px; text-align:center; background:#111; }
        button { padding:12px 24px; margin:5px; font-size:16px; background:#0066ff; color:white; border:none; border-radius:6px; }
    </style>
</head>
<body>
    <video id="preview" autoplay playsinline muted></video>
    
    <div class="controls">
        <button onclick="startStreaming()">▶️ Start Streaming</button>
        <button onclick="stopCamera()">⏹ Stop</button>
        <p id="status">Connecting to server...</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, localStream, peerConnection;
        const room = 'main-room';
        const cameraId = 'Phone-Camera-1';

        function connectSocket() {
            socket = io({ path: '/socket.io' });
            socket.on('connect', () => {
                document.getElementById('status').innerHTML = '✅ Connected • Tap Start Streaming';
                socket.emit('join-room', room);
            });
            socket.on('answer', (data) => {
                if (peerConnection) peerConnection.setRemoteDescription(data.answer);
            });
            socket.on('ice-candidate', (data) => {
                if (peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            });
        }

        async function startStreaming() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                document.getElementById('preview').srcObject = localStream;

                peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                peerConnection.onicecandidate = (e) => {
                    if (e.candidate) socket.emit('ice-candidate', { room, cameraId, candidate: e.candidate });
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('offer', { room, cameraId, offer: peerConnection.localDescription });

                document.getElementById('status').innerHTML = '📹 Streaming Live';
                startMotionDetection();
            } catch (err) {
                document.getElementById('status').innerHTML = '❌ Error: ' + err.message;
            }
        }

        function stopCamera() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (peerConnection) peerConnection.close();
            document.getElementById('status').textContent = 'Stopped';
        }

        function startMotionDetection() {
            const video = document.getElementById('preview');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let prev = null;

            setInterval(() => {
                if (!video.videoWidth) return;
                canvas.width = video.videoWidth / 5;
                canvas.height = video.videoHeight / 5;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

                if (prev) {
                    let diff = 0;
                    for (let i = 0; i < data.length; i += 4) {
                        if (Math.abs(data[i] - prev[i]) > 30) diff++;
                    }
                    if (diff > 70 && socket) {
                        socket.emit('motion-detected', { cameraId, room });
                    }
                }
                prev = new Uint8ClampedArray(data);
            }, 600);
        }

        window.onload = connectSocket;
    </script>
</body>
</html>
