<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Camera Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #0f0f0f; color: white; }
        h1 { text-align: center; }
        .camera-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 20px; }
        .camera { background: #1a1a1a; border-radius: 8px; overflow: hidden; position: relative; }
        video { width: 100%; display: block; background: black; }
        .info { padding: 12px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; }
        button { padding: 8px 16px; margin: 4px; background: #0066ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .alert { color: #ff4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <h1>📹 Security Camera Dashboard</h1>
    <p id="connection-status" style="text-align:center;color:#0f0;">Connecting...</p>
    <div id="cameras" class="camera-grid"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let peerConnection;
        const cameras = {};

        function connectSocket() {
            socket = io({ path: '/socket.io', transports: ['websocket', 'polling'] });

            socket.on('connect', () => {
                document.getElementById('connection-status').innerHTML = '✅ Connected';
                socket.emit('join-room', 'main-room');
            });

            socket.on('offer', async (data) => {
                await handleOffer(data);
            });

            socket.on('ice-candidate', async (data) => {
                if (peerConnection && data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });

            socket.on('alert', (data) => {
                const el = document.getElementById(`status-${data.cameraId}`);
                if (el) {
                    el.innerHTML = `🚨 MOTION - ${data.timestamp}`;
                    setTimeout(() => el.textContent = 'Live', 7000);
                }
            });
        }

        async function handleOffer(data) {
            const cameraId = data.cameraId || 'Phone-Camera-1';
            addCamera(cameraId);

            peerConnection = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            peerConnection.ontrack = (event) => {
                const video = document.getElementById(`video-${cameraId}`);
                if (video) video.srcObject = event.streams[0];
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { 
                        room: 'main-room', 
                        candidate: event.candidate 
                    });
                }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            socket.emit('answer', { 
                room: 'main-room', 
                answer: peerConnection.localDescription,
                cameraId: cameraId 
            });
        }

        function addCamera(id) {
            if (cameras[id]) return;
            const div = document.createElement('div');
            div.className = 'camera';
            div.innerHTML = `
                <video id="video-${id}" autoplay playsinline></video>
                <div class="info">
                    <span id="status-${id}">Live</span>
                    <div>
                        <button onclick="snapshot('${id}')">📸</button>
                    </div>
                </div>
            `;
            document.getElementById('cameras').appendChild(div);
            cameras[id] = true;
        }

        function snapshot(id) {
            const video = document.getElementById(`video-${id}`);
            if (!video) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const a = document.createElement('a');
            a.href = canvas.toDataURL();
            a.download = `snapshot-${Date.now()}.png`;
            a.click();
        }

        window.onload = connectSocket;
    </script>
</body>
</html>
