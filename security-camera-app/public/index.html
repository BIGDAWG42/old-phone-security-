<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Camera Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #0f0f0f; color: white; }
        h1 { text-align: center; }
        .camera-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 20px; }
        .camera { background: #1a1a1a; border-radius: 8px; overflow: hidden; position: relative; }
        video { width: 100%; display: block; background: #000; min-height: 400px; }
        .info { padding: 12px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; }
        button { padding: 8px 16px; background: #0066ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .log { font-size: 13px; color: #aaa; margin-top: 10px; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>📹 Security Camera Dashboard</h1>
    <p id="connection-status" style="text-align:center; color:#0f0;">Connecting...</p>
    <div id="cameras" class="camera-grid"></div>
    <div class="log" id="debug-log"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let peerConnections = {};

        function log(msg) {
            const el = document.getElementById('debug-log');
            el.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
            console.log(msg);
            el.scrollTop = el.scrollHeight;
        }

        function connectSocket() {
            socket = io({ path: '/socket.io' });

            socket.on('connect', () => {
                document.getElementById('connection-status').innerHTML = '✅ Connected';
                socket.emit('join-room', 'main-room');
                log('Socket connected successfully');
            });

            socket.on('offer', async (data) => {
                log(`📥 Received offer from ${data.cameraId}`);
                await createPeerConnection(data.cameraId, data.offer);
            });

            socket.on('ice-candidate', async (data) => {
                const pc = peerConnections[data.cameraId];
                if (pc && data.candidate) {
                    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    log('Added ICE candidate');
                }
            });

            socket.on('alert', (data) => {
                const el = document.getElementById(`status-${data.cameraId}`);
                if (el) {
                    el.innerHTML = `🚨 MOTION DETECTED - ${data.timestamp}`;
                    setTimeout(() => { if(el) el.textContent = 'Live'; }, 7000);
                }
            });
        }

        async function createPeerConnection(cameraId, offer) {
            if (peerConnections[cameraId]) return;

            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            peerConnections[cameraId] = pc;

            addCameraUI(cameraId);

            pc.ontrack = (event) => {
                log('✅ VIDEO TRACK RECEIVED!');
                const video = document.getElementById(`video-${cameraId}`);
                if (video) {
                    video.srcObject = event.streams[0];
                    video.muted = false;
                    video.play().then(() => log('Video playing')).catch(e => log('Play failed: ' + e.message));
                }
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { room: 'main-room', cameraId, candidate: event.candidate });
                }
            };

            try {
                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                log('Remote description set');
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                log('Answer created and sent');
                socket.emit('answer', { room: 'main-room', cameraId, answer: pc.localDescription });
            } catch (err) {
                log('❌ Error in peer connection: ' + err.message);
            }
        }

        function addCameraUI(id) {
            const div = document.createElement('div');
            div.className = 'camera';
            div.innerHTML = `
                <video id="video-${id}" autoplay playsinline></video>
                <div class="info">
                    <span id="status-${id}">Waiting for video...</span>
                    <button onclick="snapshot('${id}')">📸 Snapshot</button>
                </div>
            `;
            document.getElementById('cameras').appendChild(div);
        }

        function snapshot(id) {
            const video = document.getElementById(`video-${id}`);
            if (!video || !video.srcObject) return alert("No video yet");
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = `snapshot-${Date.now()}.png`;
            a.click();
        }

        window.onload = connectSocket;
    </script>
</body>
</html>
